name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 前端检查 ─────────────────────────────────────────────
  web-lint:
    name: Web Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  web-typecheck:
    name: Web Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci --legacy-peer-deps
      - run: npm run type-check

  web-test:
    name: Web Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci --legacy-peer-deps
      - run: npm test -- --coverage

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    needs: [web-lint, web-typecheck]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci --legacy-peer-deps
      - run: npm run build

  # ── Python 后端检查 ──────────────────────────────────────
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - run: pip install .[dev]
      - run: pytest --cov=backend --cov-fail-under=80

      # PR-H (GOAL-5.md 架构决策 #9): backend/skills/agent_access/SKILL.md is
      # generated from backend/taxonomy.py + the live backend/api/public/*
      # route definitions by backend/scripts/generate_skill_md.py. This step
      # re-runs that generator in --check mode and fails the job if the
      # regenerated content differs from the committed file — i.e. someone
      # changed a category or a public-route param and forgot to re-run the
      # generator + commit the result. Runs from repo root (overriding this
      # job's `backend` default working-directory) since the script resolves
      # its own paths relative to itself, not the shell's cwd — see that
      # script's module docstring for the exact "when does this go red"
      # conditions, and tests/skills/test_skill_md_drift.py for the pytest
      # equivalent of this same check.
      - name: Check SKILL.md generator drift
        working-directory: .
        run: python backend/scripts/generate_skill_md.py --check

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install ruff
      - run: ruff check .

  # ── Docker 构建 ──────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [web-build, backend-test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Web
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: false
          tags: ghcr.io/${{ github.repository }}/web:${{ github.sha }}

      - name: Build API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
